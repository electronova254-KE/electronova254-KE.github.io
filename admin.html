<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrónova | Admin Project Management Center</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #f0f2f5; color: #333; padding: 30px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 3px solid #081c3a; padding-bottom: 15px; }
  h1 { color: #081c3a; }
  .request-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 25px; border: 1px solid #e1e4e8; }
  .request-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 15px; }
  .req-id-badge { background: #081c3a; color: white; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 14px; }
  .timestamp { color: #777; font-size: 13px; }
  .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 6px; }
  .control-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding-top: 15px; border-top: 1px dashed #ccc; align-items: center; }
  .stage-selector select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; }
  .checkbox-label { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
  .update-btn { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
  .update-btn:hover { background: #218838; }
  .preview-thumb { max-height: 70px; border-radius: 4px; display: block; margin-top: 5px; border: 1px dashed #ccc; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <div>
    <h1>Electrónova Administrative Control Terminal</h1>
    <p style="color:#666; margin-top: 5px;">Manage incoming engineering requests, adjust processing workflows, and verify accounts parameters.</p>
  </div>
</header>

<div id="adminQueueContainer">
  <p style="text-align: center; color: #777; padding: 40px;">Syncing with Electrónova cloud datastore node parameters...</p>
</div>

<script>
// ELECTRONOVA LIVE CONFIGURATION LINK 
const firebaseConfig = {
  apiKey: "AIzaSyD-cchejeEdQyBtab_fX2l-yBW8y9CEFBE",
  authDomain: "electronova-fef78.firebaseapp.com",
  projectId: "electronova-fef78",
  storageBucket: "electronova-fef78.firebasestorage.app",
  messagingSenderId: "1062402179895",
  appId: "1:1062402179895:web:741fdd0f9950385192d0b2",
  measurementId: "G-7CVV29GY6Y"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let projectRequestsDB = [];

function listenToLiveDatabase() {
  db.collection("requests").onSnapshot((snapshot) => {
    projectRequestsDB = [];
    snapshot.forEach((doc) => {
      projectRequestsDB.push(doc.data());
    });
    renderAdminDashboard();
  });
}
window.onload = listenToLiveDatabase;

function renderAdminDashboard() {
  const container = document.getElementById("adminQueueContainer");
  container.innerHTML = "";

  if(projectRequestsDB.length === 0) {
    container.innerHTML = `<p style="text-align: center; color: #777; padding: 40px;">No requests found in the database.</p>`;
    return;
  }

  projectRequestsDB.forEach((req, idx) => {
    const card = document.createElement("div");
    card.className = "request-container";
    card.innerHTML = `
      <div class="request-header">
        <div>
          <span class="req-id-badge">${req.id}</span>
          <span style="margin-left: 10px; font-weight: bold; color: #081c3a;">${req.projectTitle}</span>
        </div>
        <span class="timestamp">📅 ${req.timestamp.replace("T", " ")}</span>
      </div>
      
      <div class="details-grid">
        <p><strong>Student:</strong> ${req.studentName} (${req.admNo})</p>
        <p><strong>Institution:</strong> ${req.college}</p>
        <p><strong>Course:</strong> ${req.course}</p>
        <p><strong>Region/County:</strong> ${req.county}</p>
        <p><strong>Category:</strong> ${req.category} ${req.specifyOther ? `(${req.specifyOther})` : ''}</p>
        <p><strong>Budget Range:</strong> KES ${req.minBudget.toLocaleString()} - ${req.maxBudget.toLocaleString()}</p>
        <p><strong>Contact:</strong> ${req.feedbackPref} (${req.contactInfo})</p>
      </div>

      <div class="control-section">
        <div class="stage-selector">
          <label style="font-weight:bold; display:block; margin-bottom:5px;">Workflow Stage</label>
          <select id="stageSelect-${idx}">
            <option value="Designed" ${req.currentStage === "Designed" ? 'selected' : ''}>Designed</option>
            <option value="Fabricated" ${req.currentStage === "Fabricated" ? 'selected' : ''}>Fabricated</option>
            <option value="Tested" ${req.currentStage === "Tested" ? 'selected' : ''}>Tested</option>
            <option value="Completed" ${req.currentStage === "Completed" ? 'selected' : ''}>Completed</option>
          </select>
        </div>

        <div>
          <label style="font-weight:bold; display:block; margin-bottom:5px;">Upload Output Image</label>
          <input type="file" id="fileInput-${idx}" accept="image/*" onchange="previewLocalImage(event, 'preview-${idx}')">
          <img id="preview-${idx}" class="preview-thumb" src="${req.progressImageUrl || '#'}" style="${req.progressImageUrl ? 'display:block;' : 'display:none;'}">
        </div>

        <div>
          <label class="checkbox-label"><input type="checkbox" id="payCheck-${idx}" ${req.isPaid ? 'checked' : ''}> 💳 Paid</label>
          <label class="checkbox-label" style="margin-top:10px;"><input type="checkbox" id="delivCheck-${idx}" ${req.isDelivered ? 'checked' : ''}> 📦 Delivered</label>
        </div>

        <button type="button" class="update-btn" onclick="commitChanges(${idx})">Apply Changes</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function previewLocalImage(event, previewId) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById(previewId);
      img.src = e.target.result;
      img.style.display = "block";
    }
    reader.readAsDataURL(file);
  }
}

function commitChanges(index) {
  const project = projectRequestsDB[index];
  const selectedStage = document.getElementById(`stageSelect-${index}`).value;
  const paymentConfirmed = document.getElementById(`payCheck-${index}`).checked;
  const deliveryConfirmed = document.getElementById(`delivCheck-${index}`).checked;
  const fileInput = document.getElementById(`fileInput-${index}`);

  const updateObject = {
    currentStage: selectedStage,
    isPaid: paymentConfirmed,
    isDelivered: deliveryConfirmed
  };

  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onloadend = function() {
      updateObject.progressImageUrl = reader.result;
      db.collection("requests").doc(project.id).update(updateObject).then(() => {
        alert("Pipeline variables updated with hardware images for: " + project.id);
      });
    };
    reader.readAsDataURL(file);
  } else {
    db.collection("requests").doc(project.id).update(updateObject).then(() => {
      alert("Pipeline configuration changes applied successfully for: " + project.id);
    });
  }
}
</script>
</body>
</html>
